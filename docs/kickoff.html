<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HealthLens — Team Kickoff</title>
<style>
/* ─── RESET & BASE ──────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0F172A;--surface:#1E293B;--border:#334155;--border2:#475569;
  --text:#F1F5F9;--muted:#94A3B8;--faint:#475569;
  --blue:#3B82F6;--blue-d:#1D4ED8;--blue-l:#EFF6FF;
  --green:#22C55E;--green-d:#166534;
  --amber:#F59E0B;--amber-d:#92400E;
  --red:#EF4444;--purple:#A78BFA;--teal:#2DD4BF;
  --brand:#3B82F6;
  --r:8px;--r-lg:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
code{font-family:'SF Mono','Fira Code',monospace;font-size:.85em;background:#1E293B;padding:2px 6px;border-radius:4px;color:#93C5FD}
strong{color:#F1F5F9}
kbd{background:#1E293B;border:1px solid #475569;border-radius:4px;padding:1px 7px;font-family:monospace;font-size:.85em;color:#94A3B8}

/* ─── TOP BAR ───────────────────────────────────────── */
#topbar{position:fixed;top:0;left:0;right:0;z-index:200;height:48px;background:#0F172A;border-bottom:1px solid #1E293B;display:flex;align-items:center;padding:0 20px;gap:12px}
.tb-brand{font-size:14px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px;flex-shrink:0}
.tb-logo{width:28px;height:28px;background:linear-gradient(135deg,#3B82F6,#8B5CF6);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff}
.tb-title{color:#94A3B8;font-size:13px;margin-left:4px}
.tb-sections{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;flex:1;margin:0 12px}
.tb-sections::-webkit-scrollbar{display:none}
.sec-btn{background:none;border:none;color:#475569;font-size:12px;font-weight:500;padding:4px 10px;border-radius:6px;cursor:pointer;white-space:nowrap;transition:all .12s}
.sec-btn:hover{color:#94A3B8;background:#1E293B}
.sec-btn.active{color:#fff;background:#1D4ED8}
.tb-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.mode-btn{display:flex;align-items:center;gap:6px;background:#1E293B;border:1px solid #334155;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:500;color:#94A3B8;cursor:pointer;transition:all .12s}
.mode-btn:hover{border-color:#475569;color:#F1F5F9}
.slide-counter{font-size:12px;color:#475569;min-width:50px;text-align:right}

/* ─── SLIDE MODE ────────────────────────────────────── */
#slide-mode{display:flex;flex-direction:column;height:100vh;padding-top:48px}
.slide-stage{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:24px}
.slide{display:none;width:100%;max-width:1000px;animation:sIn .22s ease-out}
.slide.active{display:block}
@keyframes sIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.slide-nav{height:52px;background:#0F172A;border-top:1px solid #1E293B;display:flex;align-items:center;justify-content:space-between;padding:0 28px;flex-shrink:0}
.nav-dots{display:flex;gap:5px;align-items:center}
.dot{width:6px;height:6px;border-radius:50%;background:#1E293B;transition:all .15s;cursor:pointer}
.dot.done{background:#334155}
.dot.active{background:#3B82F6;width:18px;border-radius:3px}
.snav-btn{background:#1E293B;border:1px solid #334155;color:#94A3B8;padding:7px 18px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:6px}
.snav-btn:hover{border-color:#475569;color:#F1F5F9}
.snav-btn:disabled{opacity:.3;cursor:not-allowed}
.snav-btn.primary{background:#1D4ED8;border-color:#1D4ED8;color:#fff}
.snav-btn.primary:hover{background:#2563EB}
.progress-line{position:absolute;top:48px;left:0;height:2px;background:linear-gradient(90deg,#3B82F6,#8B5CF6);transition:width .3s;z-index:199}

/* ─── DOC MODE ──────────────────────────────────────── */
#doc-mode{display:none;padding-top:48px;height:100vh;overflow:hidden}
.doc-layout{display:flex;height:calc(100vh - 48px)}
.doc-sidebar{width:220px;background:#0F172A;border-right:1px solid #1E293B;overflow-y:auto;padding:16px 0;flex-shrink:0}
.doc-sidebar::-webkit-scrollbar{width:3px}
.doc-sidebar::-webkit-scrollbar-thumb{background:#334155}
.doc-sec-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#475569;padding:10px 14px 4px}
.doc-item{font-size:12px;color:#64748B;padding:5px 14px;cursor:pointer;border-left:2px solid transparent;transition:all .1s;line-height:1.4}
.doc-item:hover{color:#94A3B8;background:#1E293B20}
.doc-item.active{color:#fff;border-left-color:#3B82F6;background:#1D4ED815}
.doc-body{flex:1;overflow-y:auto;padding:32px 40px 60px}
.doc-body::-webkit-scrollbar{width:4px}
.doc-body::-webkit-scrollbar-thumb{background:#334155;border-radius:2px}
.doc-section{margin-bottom:56px;scroll-margin-top:24px}
.doc-sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#475569;margin-bottom:6px}
.doc-title{font-size:28px;font-weight:700;color:#F1F5F9;margin-bottom:8px;line-height:1.2}
.doc-content{font-size:14px;color:#CBD5E1;line-height:1.7}

/* ─── SLIDE CONTENT COMPONENTS ──────────────────────── */
.slide-inner{background:#1E293B;border:1px solid #334155;border-radius:16px;padding:36px 44px;min-height:440px;display:flex;flex-direction:column;position:relative;overflow:hidden}
.slide-inner::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent-l,#3B82F6),var(--accent-r,#8B5CF6))}
.slide-sec{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--accent-l,#3B82F6);margin-bottom:10px}
.slide-h1{font-size:32px;font-weight:800;color:#F1F5F9;line-height:1.2;margin-bottom:8px}
.slide-h2{font-size:22px;font-weight:700;color:#F1F5F9;margin-bottom:6px}
.slide-sub{font-size:15px;color:#94A3B8;margin-bottom:24px;line-height:1.5}
.slide-body{font-size:14px;color:#CBD5E1;line-height:1.7;flex:1}
.slide-note{margin-top:auto;padding-top:16px;font-size:12px;color:#475569;border-top:1px solid #334155}
.tag{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;margin:2px}
.tag-blue{background:#1D4ED820;color:#60A5FA;border:1px solid #1D4ED860}
.tag-green{background:#16653420;color:#4ADE80;border:1px solid #16653460}
.tag-amber{background:#92400E20;color:#FCD34D;border:1px solid #92400E60}
.tag-red{background:#99180020;color:#F87171;border:1px solid #99180060}
.tag-purple{background:#5B21B620;color:#C4B5FD;border:1px solid #5B21B660}
.tag-teal{background:#0F766E20;color:#2DD4BF;border:1px solid #0F766E60}

/* card grid */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.card{background:#0F172A;border:1px solid #334155;border-radius:10px;padding:16px}
.card-icon{font-size:22px;margin-bottom:8px}
.card-title{font-size:13px;font-weight:700;color:#F1F5F9;margin-bottom:4px}
.card-desc{font-size:12px;color:#64748B;line-height:1.5}
.card-tag{margin-top:8px}

/* table */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{background:#0F172A;color:#94A3B8;padding:8px 12px;text-align:left;font-weight:600;border-bottom:1px solid #334155}
.tbl td{padding:8px 12px;border-bottom:1px solid #1E293B;color:#CBD5E1}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:nth-child(even) td{background:#0F172A30}

/* code block */
.codeblock{background:#0D1117;border:1px solid #30363D;border-radius:8px;padding:14px 16px;font-family:'SF Mono','Fira Code',monospace;font-size:12px;line-height:1.8;margin:10px 0;overflow-x:auto}
.codeblock .p{color:#7EE787}
.codeblock .c{color:#C9D1D9}
.codeblock .k{color:#FF7B72}
.codeblock .s{color:#A5D6FF}
.codeblock .cm{color:#8B949E}

/* good/bad */
.gb{display:flex;flex-direction:column;gap:4px}
.good{border-left:3px solid #22C55E;padding:5px 10px;background:#0D2D0D;border-radius:0 6px 6px 0;font-family:monospace;font-size:12px;color:#86EFAC}
.bad{border-left:3px solid #EF4444;padding:5px 10px;background:#1A0000;border-radius:0 6px 6px 0;font-family:monospace;font-size:12px;color:#FCA5A5}
.gl{font-size:9px;font-weight:700;text-transform:uppercase;margin-bottom:2px;color:#22C55E}
.bl{font-size:9px;font-weight:700;text-transform:uppercase;margin-bottom:2px;color:#EF4444}

/* alert */
.alert{border-radius:8px;padding:10px 14px;font-size:13px;display:flex;gap:10px;align-items:flex-start;margin:10px 0}
.ai{background:#1D4ED815;color:#93C5FD;border:1px solid #1D4ED850}
.aw{background:#92400E15;color:#FCD34D;border:1px solid #92400E50}
.ar{background:#99000015;color:#FCA5A5;border:1px solid #99000050}
.ag{background:#16653415;color:#86EFAC;border:1px solid #16653450}
.aico{flex-shrink:0;font-size:15px}

/* persona card */
.persona{background:#0F172A;border:1px solid #334155;border-radius:10px;padding:16px;display:flex;gap:12px}
.persona-avatar{width:44px;height:44px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff}
.persona-name{font-size:14px;font-weight:700;color:#F1F5F9;margin-bottom:3px}
.persona-desc{font-size:12px;color:#64748B;line-height:1.5}

/* step list */
.steps{list-style:none;padding:0;counter-reset:s}
.steps li{counter-increment:s;display:flex;gap:12px;padding:8px 0;border-bottom:1px solid #1E293B;font-size:13px;color:#CBD5E1;align-items:flex-start}
.steps li:last-child{border-bottom:none}
.steps li::before{content:counter(s);background:#1D4ED8;color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px}

/* checklist */
.cl-item{display:flex;align-items:flex-start;gap:10px;padding:7px 10px;border-radius:7px;margin-bottom:3px;cursor:pointer;user-select:none;border:1px solid transparent;transition:background .1s}
.cl-item:hover{background:#1E293B;border-color:#334155}
.cl-item.done{background:#0D2D0D15;border-color:#16653440}
.cl-item.done .cl-txt{color:#4ADE80;text-decoration:line-through}
.cl-box{width:16px;height:16px;border-radius:4px;border:1.5px solid #475569;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;transition:all .15s}
.cl-item.done .cl-box{background:#16A34A;border-color:#16A34A}
.cl-txt{font-size:13px;color:#CBD5E1}
.cl-note{font-size:11px;color:#475569;margin-left:auto;padding-left:8px;white-space:nowrap}

/* magic word */
.mw{background:#0D1117;border:1px solid #334155;border-radius:8px;padding:12px 16px;text-align:center}
.mw-kw{font-family:monospace;font-size:20px;font-weight:800;color:#60A5FA;margin-bottom:4px}
.mw-note{font-size:11px;color:#64748B}

/* tool card */
.tool-card{background:#0F172A;border:1px solid #334155;border-radius:10px;padding:14px;display:flex;gap:12px;align-items:flex-start}
.tc-icon{font-size:24px;flex-shrink:0;margin-top:2px}
.tc-name{font-size:13px;font-weight:700;color:#F1F5F9;margin-bottom:2px}
.tc-role{font-size:11px;color:#64748B;margin-bottom:6px}
.tc-bullets{font-size:12px;color:#94A3B8;line-height:1.7;list-style:none;padding:0}
.tc-bullets li::before{content:"› ";color:#3B82F6;font-weight:700}

/* iframe wrapper */
.demo-frame-wrap{background:#0F172A;border:1px solid #334155;border-radius:10px;overflow:hidden;height:400px;position:relative}
.demo-frame-wrap iframe{width:100%;height:100%;border:none}
.demo-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#0F172A;flex-direction:column;gap:12px}
.demo-open-btn{background:#1D4ED8;color:#fff;border:none;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px}
.demo-open-btn:hover{background:#2563EB}

/* arch diagram */
.arch-layer{border:1px solid #334155;border-radius:8px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.arch-layer-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#475569;width:60px;flex-shrink:0}
.arch-tools{display:flex;gap:6px;flex-wrap:wrap}
.arch-tool{font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;white-space:nowrap}

/* hero layout */
.hero-layout{display:flex;align-items:center;gap:40px}
.hero-text{flex:1}
.hero-visual{flex-shrink:0;width:260px}
.hero-logo{width:100%;background:linear-gradient(135deg,#1E3A5F,#1E293B);border-radius:20px;padding:32px;text-align:center;border:1px solid #334155}
.hero-logo-icon{font-size:56px;margin-bottom:12px}
.hero-logo-name{font-size:28px;font-weight:800;color:#F1F5F9}
.hero-logo-sub{font-size:13px;color:#64748B;margin-top:4px}

/* progress bar top */
#prog-line{position:fixed;top:48px;left:0;height:2px;background:linear-gradient(90deg,#3B82F6,#8B5CF6);transition:width .3s;z-index:199;pointer-events:none}

/* state badge */
.sbadge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.sb-todo{background:#47556920;color:#94A3B8;border:1px solid #47556940}
.sb-prog{background:#F5A62320;color:#F5A623;border:1px solid #F5A62340}
.sb-rev{background:#A78BFA20;color:#A78BFA;border:1px solid #A78BFA40}
.sb-done{background:#22C55E20;color:#22C55E;border:1px solid #22C55E40}

/* auto badge */
.auto{background:#16A34A;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;display:inline-flex;align-items:center;gap:3px;vertical-align:middle}

/* compliance badge */
.comply{background:#7C3AED20;color:#C4B5FD;border:1px solid #7C3AED40;border-radius:8px;padding:10px 14px;font-size:13px;display:flex;gap:10px;margin-top:10px}
</style>
</head>

<!-- CHECKLIST DATA -->
<script>
const CL_KEY = 'hl-kickoff-cl';
const loadCL = () => JSON.parse(localStorage.getItem(CL_KEY)||'{}');
const saveCL = d => localStorage.setItem(CL_KEY, JSON.stringify(d));
function toggleCL(key, el) {
  const s = loadCL(); s[key] = !s[key]; saveCL(s);
  el.classList.toggle('done', !!s[key]);
  el.querySelector('.cl-box').textContent = s[key] ? '✓' : '';
}
function renderCL(items, prefix) {
  const s = loadCL();
  return items.map((item, i) => {
    const key = prefix + '_' + i, done = !!s[key];
    return `<div class="cl-item ${done?'done':''}" onclick="toggleCL('${key}',this)">
      <div class="cl-box">${done?'✓':''}</div>
      <div class="cl-txt">${item.t}</div>
      ${item.n ? `<div class="cl-note">${item.n}</div>` : ''}
    </div>`;
  }).join('');
}

{ sec:2, html:`
<div class="slide-inner" style="--accent-l:#8B5CF6;--accent-r:#EC4899">
  <div class="slide-sec">Conventions — Branch Naming</div>
  <div class="slide-h2">🌿 Branch naming — pattern bắt buộc</div>
  <div style="background:#0F172A;border:1px solid #334155;border-radius:10px;padding:16px;margin-bottom:14px;text-align:center">
    <div style="font-family:monospace;font-size:20px;font-weight:700;color:#C4B5FD">prefix/<span style="color:#F59E0B">US-XX</span>-ten-ngan-gon-kebab-case</div>
    <div style="font-size:12px;color:#64748B;margin-top:6px"><span style="color:#F59E0B">US-XX</span> = ID story từ BMAD, ví dụ <code>US-01</code>, <code>US-07</code>.</div>
  </div>
  <div class="grid2">
    <div>
      <table class="tbl" style="font-size:12px;margin-bottom:0">
        <tr><th>Prefix</th><th>Dùng khi</th></tr>
        <tr><td><code>feat/</code></td><td>Tính năng mới</td></tr>
        <tr><td><code>fix/</code></td><td>Sửa bug</td></tr>
        <tr><td><code>chore/</code></td><td>Refactor, deps, cleanup</td></tr>
        <tr><td><code>docs/</code></td><td>Tài liệu, README</td></tr>
        <tr><td><code>hotfix/</code></td><td>Fix gấp production</td></tr>
      </table>
    </div>
    <div>
      <div class="gb">
        <div class="gl">✓ Đúng</div>
        <div class="good">feat/US-01-add-user-login</div>
        <div class="good">fix/US-07-null-pointer-auth</div>
        <div class="bl">✗ Sai</div>
        <div class="bad">LIN-42-login (thiếu prefix)</div>
        <div class="bad">feature/add-login (thiếu ISSUE-ID)</div>
        <div class="bad">feat/LIN-XX-login (XX không phải ID thật)</div>
        <div class="bad">feat/LIN-42-Add-Login (camelCase)</div>
      </div>
    </div>
  </div>
  <div class="alert aw" style="margin-top:10px"><span class="aico">⚠</span>Branch phải có <strong>US-XX thật</strong> (US-01, US-07...) để Linear Git Automation nhận diện và tự chuyển state sang In Progress. <a href="https://linear.app/docs/github#git-automation" target="_blank">→ Linear docs</a></div>
</div>`},

// ── S13: Code review etiquette ───────────────────────────
{ sec:2, html:`
<div class="slide-inner" style="--accent-l:#8B5CF6;--accent-r:#EC4899">
  <div class="slide-sec">Conventions — Code Review</div>
  <div class="slide-h2">👁 Code Review Etiquette</div>
  <div class="slide-sub">Rules giúp review process nhanh và không tạo friction.</div>
  <div style="display:flex;flex-direction:column;gap:8px">
    <div style="display:flex;gap:14px;padding:10px;background:#0F172A;border-radius:8px;border:1px solid #334155;font-size:13px">
      <div style="font-weight:700;color:#C4B5FD;min-width:160px;flex-shrink:0">Comment xây dựng</div>
      <div style="color:#94A3B8">Chỉ rõ vấn đề + gợi ý fix. Không comment "cái này sai" mà không giải thích.</div>
    </div>
    <div style="display:flex;gap:14px;padding:10px;background:#0F172A;border-radius:8px;border:1px solid #334155;font-size:13px">
      <div style="font-weight:700;color:#C4B5FD;min-width:160px;flex-shrink:0">nit: non-blocking</div>
      <div style="color:#94A3B8">Dùng tiền tố <code>nit:</code> cho comment style, naming nhỏ không blocking. Blocking → Request changes.</div>
    </div>
    <div style="display:flex;gap:14px;padding:10px;background:#0F172A;border-radius:8px;border:1px solid #334155;font-size:13px">
      <div style="font-weight:700;color:#C4B5FD;min-width:160px;flex-shrink:0">Approve rõ ràng</div>
      <div style="color:#94A3B8">Bấm nút <strong>Approve</strong> trong GitHub — không chỉ comment "LGTM". Không Approve = không merge được.</div>
    </div>
    <div style="display:flex;gap:14px;padding:10px;background:#0F172A;border-radius:8px;border:1px solid #334155;font-size:13px">
      <div style="font-weight:700;color:#C4B5FD;min-width:160px;flex-shrink:0">Không rewrite code</div>
      <div style="color:#94A3B8">Muốn refactor → tạo issue riêng. Không sửa thẳng code của người khác trong review.</div>
    </div>
    <div style="display:flex;gap:14px;padding:10px;background:#0F172A;border-radius:8px;border:1px solid #334155;font-size:13px">
      <div style="font-weight:700;color:#C4B5FD;min-width:160px;flex-shrink:0">Đọc context trước</div>
      <div style="color:#94A3B8">Mở issue Linear + đọc PR description trước khi xem code — hiểu "why" trước khi đánh giá "how".</div>
    </div>
  </div>
  <div class="alert ai" style="margin-top:10px"><span class="aico">💡</span>Sau khi Request changes: author fix → commit → reply "Done" vào comment → re-request review. Reviewer kiểm tra lại rồi Approve.</div>
</div>`},

// ════════════════════════════════════════════════════════════
// ENGINE
// ════════════════════════════════════════════════════════════
let cur = 0;
let isDocMode = false;

function buildSlides() {
  const container = document.getElementById('slides-container');
  container.innerHTML = SLIDES.map((s, i) =>
    `<div class="slide ${i===0?'active':''}" id="slide-${i}">${s.html}</div>`
  ).join('');
  const dots = document.getElementById('nav-dots');
  dots.innerHTML = SLIDES.map((_,i) =>
    `<div class="dot ${i===0?'active':''}" id="dot-${i}" onclick="goTo(${i})"></div>`
  ).join('');
}

function buildSecNav() {
  document.getElementById('sec-nav').innerHTML = SECTIONS.map((s,i) =>
    `<button class="sec-btn ${i===0?'active':''}" id="secbtn-${i}" onclick="goToSection(${i})">${s.label}</button>`
  ).join('');
}

function updateUI() {
  // slide
  document.querySelectorAll('.slide').forEach((el,i) => el.classList.toggle('active', i===cur));
  document.querySelectorAll('.dot').forEach((el,i) => {
    el.classList.toggle('active', i===cur);
    el.classList.toggle('done', i<cur);
  });
  // progress
  const pct = ((cur+1)/SLIDES.length*100).toFixed(1);
  document.getElementById('prog-line').style.width = pct + '%';
  document.getElementById('slide-counter').textContent = (cur+1) + ' / ' + SLIDES.length;
  document.getElementById('btn-prev').disabled = cur===0;
  document.getElementById('btn-next').disabled = false;
  document.getElementById('btn-next').textContent = cur===SLIDES.length-1 ? '🎉 Xong!' : 'Tiếp theo →';
  // section nav
  const secIdx = SLIDES[cur].sec;
  document.querySelectorAll('.sec-btn').forEach((b,i) => b.classList.toggle('active', i===secIdx));
  // doc active
  document.querySelectorAll('.doc-item').forEach((el,i) => el.classList.toggle('active', i===cur));
}

function navigate(dir) {
  const next = cur + dir;
  if (next < 0 || next >= SLIDES.length) return;
  cur = next; updateUI();
}

function goTo(i) { cur = i; updateUI(); }

function goToSection(secIdx) {
  const idx = SLIDES.findIndex(s => s.sec === secIdx);
  if (idx >= 0) goTo(idx);
}

// Doc mode sidebar & body
function buildDocMode() {
  const sidebar = document.getElementById('doc-sidebar');
  const body = document.getElementById('doc-body');
  sidebar.innerHTML = SLIDES.map((s, i) => {
    const sec = SECTIONS[s.sec];
    const isFirst = i === 0 || SLIDES[i-1].sec !== s.sec;
    const label = s.html.match(/slide-h2">(.*?)<\/div>/)?.[1]?.replace(/<[^>]+>/g,'') ||
                  s.html.match(/slide-h1"[^>]*>(.*?)<\/div>/)?.[1]?.replace(/<[^>]+>/g,'') || 'Slide '+(i+1);
    return (isFirst ? `<div class="doc-sec-label">${sec.label}</div>` : '') +
           `<div class="doc-item ${i===cur?'active':''}" onclick="goTo(${i}); scrollDocTo(${i})" id="dsi-${i}">${label.substring(0,40)}</div>`;
  }).join('');
  body.innerHTML = SLIDES.map((s,i) =>
    `<div class="doc-section" id="doc-sec-${i}">
      <div style="margin-bottom:16px">${s.html.replace(/class="slide-inner"/g,'style="background:#1E293B;border:1px solid #334155;border-radius:12px;padding:24px"')}</div>
    </div>`
  ).join('');
}

function scrollDocTo(i) {
  document.getElementById('doc-sec-'+i)?.scrollIntoView({behavior:'smooth', block:'start'});
}

function toggleMode() {
  isDocMode = !isDocMode;
  document.getElementById('slide-mode').style.display = isDocMode ? 'none' : 'flex';
  document.getElementById('doc-mode').style.display   = isDocMode ? 'block' : 'none';
  document.getElementById('mode-icon').textContent    = isDocMode ? '▶' : '📄';
  document.getElementById('mode-label').textContent   = isDocMode ? 'Slide mode' : 'Doc mode';
  document.getElementById('prog-line').style.display  = isDocMode ? 'none' : 'block';
  if (isDocMode) buildDocMode();
}

// Demo iframe loader
function loadDemo() {
  const wrap = document.getElementById('demo-frame-wrap');
  const overlay = document.getElementById('demo-overlay');
  overlay.style.display = 'none';
  const iframe = document.createElement('iframe');
  iframe.src = 'demo.html';
  iframe.style.cssText = 'width:100%;height:100%;border:none';
  wrap.appendChild(iframe);
}

// Keyboard
document.addEventListener('keydown', e => {
  if (isDocMode) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); navigate(1); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp') { e.preventDefault(); navigate(-1); }
});

// Init
buildSlides();
buildSecNav();
updateUI();
</script>
</body>
</html>
