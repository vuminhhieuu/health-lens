<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Team Workflow Demo</title>
<style>
/* в”Ђв”Ђ RESET & BASE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#0F172A;color:#E2E8F0;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* в”Ђв”Ђ TOP BAR в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
.topbar{background:#1E293B;border-bottom:1px solid #334155;padding:0 24px;height:52px;display:flex;align-items:center;gap:16px;flex-shrink:0;z-index:100}
.topbar-brand{color:#fff;font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.topbar-brand svg{opacity:.8}
.flow-tabs{display:flex;gap:4px;margin-left:8px;overflow-x:auto;scrollbar-width:none}
.flow-tabs::-webkit-scrollbar{display:none}
.flow-tab{background:none;border:none;color:#64748B;font-size:12px;font-weight:500;padding:6px 12px;border-radius:6px;cursor:pointer;white-space:nowrap;transition:all .15s}
.flow-tab:hover{color:#94A3B8;background:#263548}
.flow-tab.active{color:#fff;background:#1D4ED8}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.kbd-hint{font-size:11px;color:#475569;display:flex;align-items:center;gap:4px}
kbd{background:#263548;border:1px solid #334155;border-radius:4px;padding:1px 6px;font-family:monospace;font-size:11px;color:#94A3B8}

/* в”Ђв”Ђ MAIN LAYOUT в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
.main{display:flex;flex:1;overflow:hidden}

/* в”Ђв”Ђ LEFT PANEL вЂ” step list в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
.steps-panel{width:240px;background:#1E293B;border-right:1px solid #334155;padding:16px 0;overflow-y:auto;flex-shrink:0}
.steps-panel::-webkit-scrollbar{width:4px}
.steps-panel::-webkit-scrollbar-thumb{background:#334155;border-radius:2px}
.flow-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#475569;padding:0 16px 10px}
.step-item{display:flex;align-items:flex-start;gap:10px;padding:9px 16px;cursor:pointer;transition:background .1s;border-left:2px solid transparent}
.step-item:hover{background:#263548}
.step-item.active{background:#1D4ED820;border-left-color:#3B82F6}
.step-item.done{opacity:.6}
.step-num{width:20px;height:20px;border-radius:50%;background:#334155;color:#64748B;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .2s}
.step-item.active .step-num{background:#1D4ED8;color:#fff}
.step-item.done .step-num{background:#166534;color:#4ADE80;font-size:12px}
.step-item.done .step-num::after{content:"вњ“"}
.step-label{font-size:12px;color:#94A3B8;line-height:1.4}
.step-item.active .step-label{color:#E2E8F0;font-weight:500}

/* в”Ђв”Ђ CENTER вЂ” demo stage в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
.stage{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
.stage-content{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;overflow:hidden;position:relative}
.scene{display:none;width:100%;max-width:860px;animation:fadeSlide .25s ease-out}
.scene.active{display:block}
@keyframes fadeSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* в”Ђв”Ђ BOTTOM NAV в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
.bottom-nav{background:#1E293B;border-top:1px solid #334155;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.progress-wrap{flex:1;max-width:300px;margin:0 24px}
.progress-label{font-size:11px;color:#475569;margin-bottom:4px;display:flex;justify-content:space-between}
.progress-bar{height:3px;background:#334155;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#1D4ED8,#3B82F6);border-radius:2px;transition:width .3s ease}
.nav-btn{background:#1D4ED8;color:#fff;border:none;padding:8px 20px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s}
.nav-btn:hover{background:#1E40AF}
.nav-btn.secondary{background:#263548;color:#94A3B8}
.nav-btn.secondary:hover{background:#334155;color:#E2E8F0}
.nav-btn:disabled{opacity:.4;cursor:not-allowed}

/* в”Ђв”Ђ MOCK UI COMPONENTS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */

/* Slack mock */
.slack-wrap{background:#1A1D21;border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);display:flex;height:500px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.slack-sidebar{width:220px;background:#19171D;flex-shrink:0;padding:12px 0;border-right:1px solid #2D2B34}
.slack-workspace{padding:8px 16px 12px;font-size:14px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px;border-bottom:1px solid #2D2B34;margin-bottom:8px}
.slack-ws-dot{width:28px;height:28px;background:#4A154B;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0}
.slack-section{font-size:11px;font-weight:600;color:#897E8E;padding:4px 16px 2px;text-transform:uppercase;letter-spacing:.4px}
.slack-ch{font-size:13px;color:#897E8E;padding:3px 12px 3px 16px;cursor:pointer;border-radius:4px;margin:0 4px;display:flex;align-items:center;gap:6px}
.slack-ch:hover{background:#27242C;color:#D1D2D3}
.slack-ch.active{background:#1264A3;color:#fff}
.slack-ch-hash{font-size:14px;opacity:.6}
.slack-main{flex:1;display:flex;flex-direction:column;background:#1A1D21}
.slack-header{padding:12px 16px;border-bottom:1px solid #2D2B34;display:flex;align-items:center;gap:8px}
.slack-header-name{font-size:15px;font-weight:700;color:#D1D2D3}
.slack-header-hash{font-size:16px;color:#897E8E}
.slack-messages{flex:1;padding:12px 16px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.slack-messages::-webkit-scrollbar{width:4px}
.slack-messages::-webkit-scrollbar-thumb{background:#2D2B34}
.slack-msg{display:flex;gap:10px}
.slack-avatar{width:34px;height:34px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff}
.slack-msg-body{flex:1}
.slack-msg-header{display:flex;align-items:baseline;gap:8px;margin-bottom:2px}
.slack-msg-author{font-size:13px;font-weight:700;color:#D1D2D3}
.slack-msg-time{font-size:11px;color:#565761}
.slack-msg-text{font-size:13px;color:#D1D2D3;line-height:1.5;white-space:pre-wrap}
.slack-msg-text code{background:#2D2B34;padding:1px 5px;border-radius:3px;font-family:monospace;font-size:12px;color:#E8912D}
.slack-msg-text strong{color:#fff}
.slack-bot-badge{background:#2D2B34;color:#897E8E;font-size:10px;padding:1px 5px;border-radius:3px;margin-left:4px;font-weight:500}
.slack-input{padding:10px 16px;border-top:1px solid #2D2B34}
.slack-input-box{background:#2D2B34;border-radius:8px;padding:10px 14px;font-size:13px;color:#897E8E;display:flex;align-items:center;justify-content:space-between}
.msg-appear{animation:msgIn .3s ease-out}
@keyframes msgIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}

/* Linear mock */
.linear-wrap{background:#1C1C1E;border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);display:flex;height:500px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.linear-sidebar{width:200px;background:#161618;border-right:1px solid #2C2C2E;padding:12px 0}
.linear-team{padding:8px 12px 12px;font-size:13px;font-weight:600;color:#F5F5F7;display:flex;align-items:center;gap:8px;border-bottom:1px solid #2C2C2E;margin-bottom:8px}
.linear-team-icon{width:24px;height:24px;background:#5E6AD2;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff}
.linear-nav-item{font-size:12px;color:#8A8A8E;padding:5px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;border-radius:4px;margin:0 4px}
.linear-nav-item:hover{background:#2C2C2E;color:#F5F5F7}
.linear-nav-item.active{background:#2C2C2E;color:#F5F5F7}
.linear-main{flex:1;display:flex;flex-direction:column}
.linear-header{padding:12px 16px;border-bottom:1px solid #2C2C2E;display:flex;align-items:center;gap:10px}
.linear-header-title{font-size:15px;font-weight:600;color:#F5F5F7}
.linear-issues{padding:8px}
.linear-group-header{font-size:11px;font-weight:600;color:#8A8A8E;padding:6px 8px;text-transform:uppercase;letter-spacing:.4px;display:flex;align-items:center;gap:6px}
.linear-issue{background:#1C1C1E;border:1px solid #2C2C2E;border-radius:8px;padding:10px 12px;margin-bottom:4px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:border-color .15s}
.linear-issue:hover{border-color:#3C3C3E}
.linear-issue.highlighted{border-color:#5E6AD2;background:#5E6AD215}
.li-status{width:14px;height:14px;border-radius:50%;flex-shrink:0;border:2px solid}
.li-status.todo{border-color:#8A8A8E;background:transparent}
.li-status.in-progress{border-color:#F5A623;background:#F5A62330}
.li-status.in-review{border-color:#A78BFA;background:#A78BFA30}
.li-status.done{border-color:#34D399;background:#34D39930}
.li-id{font-size:11px;color:#8A8A8E;font-weight:600;min-width:50px}
.li-title{font-size:13px;color:#F5F5F7;flex:1}
.li-label{font-size:10px;padding:1px 6px;border-radius:10px;font-weight:600}
.li-label.feature{background:#1D4ED830;color:#60A5FA}
.li-label.bug{background:#DC262630;color:#F87171}
.li-assignee{width:22px;height:22px;border-radius:50%;background:#5E6AD2;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.state-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.state-todo{background:#8A8A8E20;color:#8A8A8E}
.state-progress{background:#F5A62320;color:#F5A623}
.state-review{background:#A78BFA20;color:#A78BFA}
.state-done{background:#34D39920;color:#34D399}
.state-change-anim{animation:statePop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes statePop{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}

/* GitHub mock */
.gh-wrap{background:#0D1117;border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);height:500px;display:flex;flex-direction:column;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.gh-header{background:#161B22;border-bottom:1px solid #30363D;padding:10px 16px;display:flex;align-items:center;gap:10px}
.gh-logo{color:#E6EDF3;font-size:18px}
.gh-repo{font-size:13px;color:#58A6FF;font-weight:600}
.gh-slash{color:#30363D;margin:0 4px}
.gh-tabs{display:flex;gap:0;border-bottom:1px solid #30363D;padding:0 16px;background:#161B22}
.gh-tab{font-size:12px;color:#8B949E;padding:8px 12px;border-bottom:2px solid transparent;cursor:pointer}
.gh-tab.active{color:#E6EDF3;border-bottom-color:#F78166}
.gh-body{flex:1;overflow-y:auto;padding:16px}
.gh-body::-webkit-scrollbar{width:4px}
.gh-body::-webkit-scrollbar-thumb{background:#30363D}
.gh-pr-header{margin-bottom:14px}
.gh-pr-title{font-size:18px;font-weight:600;color:#E6EDF3;margin-bottom:6px}
.gh-pr-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.gh-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.gh-badge-open{background:#238636;color:#fff}
.gh-badge-merged{background:#8957E5;color:#fff}
.gh-pr-author{font-size:12px;color:#8B949E}
.gh-pr-author strong{color:#58A6FF}
.gh-diff{background:#0D1117;border:1px solid #30363D;border-radius:8px;overflow:hidden;margin-bottom:12px}
.gh-diff-header{background:#161B22;padding:8px 12px;font-size:12px;color:#8B949E;border-bottom:1px solid #30363D}
.gh-diff-line{font-family:'SF Mono','Fira Code',monospace;font-size:11px;padding:1px 12px;display:flex;gap:8px}
.gh-diff-num{color:#30363D;min-width:32px;text-align:right;user-select:none}
.gh-diff-add{background:#0D4429;color:#3FB950}
.gh-diff-del{background:#67060C;color:#F85149}
.gh-diff-ctx{color:#8B949E}
.gh-checks{background:#0D1117;border:1px solid #30363D;border-radius:8px;overflow:hidden;margin-bottom:12px}
.gh-check{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #30363D;font-size:13px;color:#E6EDF3}
.gh-check:last-child{border-bottom:none}
.gh-check-icon{font-size:14px;flex-shrink:0}
.gh-check-name{flex:1;font-size:12px}
.gh-check-status{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.gh-status-pass{background:#0D4429;color:#3FB950}
.gh-status-fail{background:#67060C;color:#F85149}
.gh-status-pending{background:#3D2E00;color:#D29922}
.gh-merge-btn{background:#238636;color:#fff;border:none;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .15s}
.gh-merge-btn:hover{background:#2EA043}
.gh-merge-btn.merged{background:#8957E5}

/* Terminal mock */
.terminal{background:#0D1117;border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);font-family:'SF Mono','Fira Code','Courier New',monospace}
.terminal-header{background:#1C2128;padding:10px 14px;display:flex;align-items:center;gap:6px;border-bottom:1px solid #30363D}
.terminal-dot{width:12px;height:12px;border-radius:50%}
.terminal-title{font-size:12px;color:#8B949E;margin-left:8px}
.terminal-body{padding:16px;min-height:160px;font-size:13px;line-height:1.8;color:#C9D1D9}
.t-prompt{color:#7EE787}
.t-cmd{color:#C9D1D9}
.t-out{color:#8B949E}
.t-success{color:#3FB950}
.t-branch{color:#58A6FF}
.t-cursor{display:inline-block;width:8px;height:14px;background:#C9D1D9;animation:blink .8s infinite;vertical-align:middle}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.type-anim{overflow:hidden;white-space:nowrap;border-right:2px solid #C9D1D9;animation:typing .6s steps(30) forwards,caret .8s step-end infinite}
@keyframes typing{from{width:0}to{width:100%}}

/* в”Ђв”Ђ SCENE SPECIFIC STYLES в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
.scene-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#475569;margin-bottom:8px}
.annotation{background:#1D4ED820;border:1px solid #1D4ED860;border-radius:8px;padding:10px 14px;margin-top:12px;font-size:13px;color:#93C5FD;display:flex;gap:8px;align-items:flex-start}
.annotation-icon{flex-shrink:0;font-size:16px}
.auto-badge{background:#166534;color:#4ADE80;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;display:inline-flex;align-items:center;gap:4px}
.highlight-box{border:2px solid #F59E0B;border-radius:8px;position:relative}
.highlight-box::before{content:"рџ‘†";position:absolute;top:-28px;left:50%;transform:translateX(-50%);font-size:16px;animation:bounce .8s ease infinite}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-4px)}}
.step-context{background:#1E293B;border:1px solid #334155;border-radius:10px;padding:14px 16px;margin-bottom:14px}
.step-context-title{font-size:12px;font-weight:600;color:#64748B;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.step-context-body{font-size:13px;color:#CBD5E1;line-height:1.6}
.step-context-body strong{color:#F1F5F9}
.step-context-body code{background:#334155;padding:1px 6px;border-radius:3px;font-family:monospace;font-size:12px;color:#93C5FD}

/* DM mock */
.dm-wrap{background:#1A1D21;border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);display:flex;height:420px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.dm-sidebar{width:200px;background:#161618;border-right:1px solid #2D2B34;padding:12px 0}
.dm-section{font-size:11px;font-weight:600;color:#897E8E;padding:6px 12px 3px;text-transform:uppercase;letter-spacing:.4px}
.dm-item{font-size:13px;color:#897E8E;padding:4px 12px;display:flex;align-items:center;gap:8px;cursor:pointer;border-radius:4px;margin:0 4px}
.dm-item:hover{background:#27242C;color:#D1D2D3}
.dm-item.active{background:#1264A3;color:#fff}
.dm-avatar{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0}
.dm-main{flex:1;display:flex;flex-direction:column}
.dm-header{padding:10px 14px;border-bottom:1px solid #2D2B34;display:flex;align-items:center;gap:8px}
.dm-header-title{font-size:14px;font-weight:700;color:#D1D2D3}
.dm-messages{flex:1;padding:12px 14px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.dm-bot-msg{background:#27242C;border-radius:8px;padding:10px 12px;max-width:85%}
.dm-bot-msg .text{font-size:13px;color:#D1D2D3;line-height:1.5;white-space:pre-wrap}
.dm-bot-msg .text strong{color:#fff}
.dm-user-reply{background:#1264A330;border-radius:8px;padding:10px 12px;max-width:85%;align-self:flex-end;border:1px solid #1264A360}
.dm-user-reply .text{font-size:13px;color:#D1D2D3;line-height:1.5}
.dm-input{padding:8px 14px;border-top:1px solid #2D2B34}
.dm-input-box{background:#2D2B34;border-radius:8px;padding:8px 12px;font-size:13px;color:#D1D2D3;min-height:36px}

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
// STATE
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
let curFlow = 0;
let curStep = 0;

// в”Ђв”Ђ Build UI в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function buildFlowTabs() {
  const el = document.getElementById('flow-tabs');
  el.innerHTML = FLOWS.map((f,i) =>
    `<button class="flow-tab ${i===0?'active':''}" onclick="switchFlow(${i})">${f.label}</button>`
  ).join('');
}

function buildStepsList() {
  const flow = FLOWS[curFlow];
  document.getElementById('steps-flow-title').textContent = flow.label;
  document.getElementById('steps-list').innerHTML = flow.steps.map((s,i) => `
    <div class="step-item ${i===curStep?'active':i<curStep?'done':''}" onclick="goStep(${i})">
      <div class="step-num">${i<curStep?'':i+1}</div>
      <div class="step-label">${s.label}</div>
    </div>`
  ).join('');
}

function renderScene() {
  const scene = FLOWS[curFlow].steps[curStep].scene;
  const html = SCENES[scene] || `<div style="color:#64748B;text-align:center;padding:40px">Scene: ${scene}</div>`;
  const el = document.getElementById('stage-content');
  el.innerHTML = `<div class="scene active">${html}</div>`;
  el.querySelector('pre code') && document.querySelectorAll('pre code').forEach(b => {
    try { hljs && hljs.highlightElement(b); } catch(e) {}
  });
}

function updateProgress() {
  const totalSteps = FLOWS[curFlow].steps.length;
  const pct = ((curStep + 1) / totalSteps * 100).toFixed(0);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = `BЖ°б»›c ${curStep + 1}/${totalSteps}`;
  document.getElementById('prog-frac').textContent = FLOWS[curFlow].steps[curStep].label;
  document.getElementById('btn-prev').disabled = curStep === 0;
  document.getElementById('btn-next').textContent = curStep === totalSteps - 1 ? 'Flow tiбєїp theo в†’' : 'Tiбєїp theo в†’';
}

function render() {
  buildStepsList();
  renderScene();
  updateProgress();
}

// в”Ђв”Ђ Navigation в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function navigate(dir) {
  const totalSteps = FLOWS[curFlow].steps.length;
  const newStep = curStep + dir;
  if (newStep < 0) {
    if (curFlow > 0) { switchFlow(curFlow - 1, 'last'); }
    return;
  }
  if (newStep >= totalSteps) {
    if (curFlow < FLOWS.length - 1) { switchFlow(curFlow + 1); }
    return;
  }
  curStep = newStep;
  render();
}

function goStep(i) { curStep = i; render(); }

function switchFlow(i, pos) {
  curFlow = i;
  curStep = pos === 'last' ? FLOWS[i].steps.length - 1 : 0;
  document.querySelectorAll('.flow-tab').forEach((t,j) => t.classList.toggle('active', j===i));
  render();
}

// в”Ђв”Ђ Keyboard в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); navigate(1); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); navigate(-1); }
});

// в”Ђв”Ђ Init в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
buildFlowTabs();
render();
</script>
